<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AqarLak - تجربة الربط</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f6f9;
        }
        button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <button id="btnSend">إرسال تجربة إلى Firebase</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // إعدادات مشروعك الخاصة (AqarLak) كما هي مستخرجة من حسابك
        const firebaseConfig = {
            apiKey: "AIzaSyAyqYbnurEZe7uMe3eXO07qefcDJUdvlPY",
            authDomain: "aqarlak-9009a.firebaseapp.com",
            databaseURL: "https://aqarlak-9009a-default-rtdb.firebaseio.com",
            projectId: "aqarlak-9009a",
            storageBucket: "aqarlak-9009a.firebasestorage.app",
            messagingSenderId: "656527514630",
            appId: "1:656527514630:web:d7dbc70d01de4ff5bc7787",
            measurementId: "G-VWBMS8XF9S"
        };

        // تشغيل التطبيق وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ربط الزر بالدالة عند الضغط
        document.getElementById("btnSend").addEventListener("click", () => {
            // إرسال البيانات إلى مسار test
            set(ref(db, 'test'), {
                message: "تم الإرسال من موقع بشار بنجاح واشتغل الكود!",
                status: "ناجح",
                time: new Date().toLocaleTimeString()
            })
            .then(() => {
                alert("ممتاز يا بشار! تم إرسال البيانات بنجاح إلى Firebase واختفت كلمة null!");
            })
            .catch((error) => {
                alert("هناك مشكلة في القواعد أو الإدخال: " + error.message);
            });
        });
    </script>

</body>
</html>
