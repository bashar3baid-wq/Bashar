<button id="testBtn">إرسال تجربة</button>

<script type="module">
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  document.getElementById("testBtn").addEventListener("click", () => {
    const db = getDatabase();
    set(ref(db, 'test/'), {
      message: "تم الإرسال من الموقع بنجاح!"
    }).then(() => {
      alert("تم الإرسال بنجاح!");
    }).catch((error) => {
      alert("حدث خطأ: " + error.message);
    });
  });
</script>
