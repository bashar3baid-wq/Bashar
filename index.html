<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد صالون حلاقة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #F4F6F9; padding: 20px; text-align: center; direction: rtl; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2C3E50; margin-bottom: 20px; }
        label { display: block; text-align: right; margin-top: 10px; color: #7F8C8D; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 1px solid #BDC3C7; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1ABC9C; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #16A085; }
    </style>
</head>
<body>

    <div class="card">
        <h2>✂️ حجز موعد صالون حلاقة ✂️</h2>
        
        <label>اسم الزبون:</label>
        <input type="text" id="customerName" placeholder="أدخل اسمك هنا">
        
        <label>الخدمة المطلوبة:</label>
        <select id="serviceType">
            <option value="قص شعر">قص شعر</option>
            <option value="حلاقة ذقن">حلاقة ذقن</option>
            <option value="قص شعر + ذقن">قص شعر + ذقن</option>
            <option value="تنظيف بشرة / كامل">تنظيف بشرة / باقة كاملة</option>
        </select>
        
        <button onclick="sendBookingData()">تأكيد وإرسال الحجز 🚀</button>
    </div>

    <script>
        // كود الفايربيس البرتقالي الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyAyqYbnurEZe7uMe3eXO07qefcDJUdvlPY",
            authDomain: "aqarlak-9009a.firebaseapp.com",
            databaseURL: "https://aqarlak-9009a-default-rtdb.firebaseio.com",
            projectId: "aqarlak-9009a",
            storageBucket: "aqarlak-9009a.firebasestorage.app",
            messagingSenderId: "656527514630",
            appId: "1:656527514630:web:9b44decd58d7539ebc7787"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendBookingData() {
            const name = document.getElementById("customerName").value;
            const service = document.getElementById("serviceType").value;
            
            if(name.trim() !== "") {
                // تسجيل وقت إرسال الطلب تلقائياً لكي تراه في التطبيق
                const currentTime = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

                // إرسال البيانات إلى مسار الحجوزات (barber_bookings)
                database.ref('barber_bookings').push({
                    customer_name: name,
                    service_type: service,
                    booking_time: currentTime
                }).then(() => {
                    alert("✅ تم إرسال حجزك بنجاح! ننتظرك في الصالون.");
                    document.getElementById("customerName").value = "";
                }).catch((error) => {
                    alert("خطأ أثناء الحجز: " + error.message);
                });
            } else {
                alert("الرجاء إدخال اسمك أولاً لتأكيد الحجز!");
            }
        }
    </script>
</body>
</html>
